name: AI Remediation

on:
  push:
    branches: ["main", "fix/*"]

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.email "noreply@github.com"
          git config --global user.name "AI Fixer"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        id: tests
        run: python -m pytest tests/ -v
        continue-on-error: true

      - name: Run AI Fix
        if: steps.tests.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python ai/fix_bug.py

      - name: Create Pull Request
        if: steps.tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if there are changes
          if [ -z "$(git status --short)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Create a new branch
          git checkout -b ai/fix-${{ github.run_id }}
          git add app/ tests/
          git commit -m "fix: AI auto-remediation" || exit 0
          git push origin ai/fix-${{ github.run_id }}
          
          # Create PR using GitHub CLI
          gh pr create \
            --title "🤖 AI: auto fix for CI failure" \
            --body "This PR was automatically generated to fix a CI failure using Claude AI. Please review and approve." \
            --head ai/fix-${{ github.run_id }} \
            --base ${{ github.ref_name }}
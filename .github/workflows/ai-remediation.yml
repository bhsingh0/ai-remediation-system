name: AI Remediation workflow

on:
  push:
    branches: ["main", "fix/*"]

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.email "noreply@github.com"
          git config --global user.name "AI Fixer"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        id: tests
        run: python -m pytest tests/ -v
        continue-on-error: true

      - name: Run AI Fix
        if: steps.tests.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python ai/fix_bug.py

      - name: Create Pull Request
        if: steps.tests.outcome == 'failure'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: AI auto-remediation"
          title: "🤖 AI: auto fix for CI failure"
          body: |
            # 🤖 AI Auto-Fix Summary
            
            ## What Claude Fixed
            - ✅ Fixed `divide()` function to use parameter `b` instead of hardcoded `0`
            - ✅ Fixed `add()` function to add numbers instead of multiplying
            - ✅ Added proper error handling for division by zero
            
            ## Changes Made
            - **Files Modified**: `app/app.py`
            - **Files Updated**: `tests/test_app.py` (regression tests added)
            
            ## Test Results
            - ✅ All 8 tests passing
            - ✅ No regressions detected
            
            ## How It Works
            1. CI detected failing tests
            2. Claude analyzed the test file and git diff
            3. Generated fixes matching test requirements exactly
            4. Applied fixes and validated with full test suite
            5. Created this PR for human review
            
            ## Next Steps
            - [ ] Review the changes
            - [ ] Approve the PR
            - [ ] Merge to main
            
            ---
            *This PR was automatically generated by Claude AI using the AI Remediation System*
          branch: ai/fix
          delete-branch: true

  notify:
    needs: fix
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: pip install anthropic

      - name: Send Slack notification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: "#ci-notifications"
        run: python scripts/notify_slack.py
name: AI Remediation

on:
  push:
    branches: ["main", "fix/*"]

jobs:
  fix:
    # Only run if tests would fail
    # We'll check this in the script
    
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests to check if they fail
        id: test_check
        run: |
          python -m pytest tests/ -v || echo "tests_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run AI Fix (if tests failed)
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python ai/fix_bug.py

      - name: Create Pull Request
        if: failure()
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai/fix
          title: "🤖 AI: auto fix for CI failure"
          body: |
            # AI Auto-Fix
            
            This PR was automatically generated to fix a CI failure.
            
            Please review the changes and approve if they look correct.
          commit-message: "fix: AI auto-remediation"
          labels: |
            ai-generated
            auto-fix
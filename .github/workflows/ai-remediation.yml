name: AI Remediation

on:
  push:
    branches: ["main", "fix/*"]

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.email "noreply@example.com"
          git config --global user.name "AI Fixer"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        id: tests
        run: python -m pytest tests/ -v
        continue-on-error: true

      - name: Show test results
        run: |
          echo "Exit code: ${{ steps.tests.outcome }}"
          if [ "${{ steps.tests.outcome }}" = "failure" ]; then
            echo "Tests FAILED - will run AI fix"
          else
            echo "Tests PASSED - no fix needed"
          fi

      - name: Run AI Fix
        if: steps.tests.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Running AI fix script..."
          uv run python ai/fix_bug.py

      - name: Create Pull Request
        if: steps.tests.outcome == 'failure'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai/fix
          title: "🤖 AI: auto fix for CI failure"
          body: |
            # AI Auto-Fix PR
            
            This PR was automatically generated to fix a CI failure using Claude AI.
            
            Please review the changes and approve if they look correct.
          commit-message: "fix: AI auto-remediation"
          labels: |
            ai-generated
            auto-fix
          delete-branch: true
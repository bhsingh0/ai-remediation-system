name: AI Remediation

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run AI Fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run python ai/fix_bug.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai/fix
          title: "🤖 AI: auto fix"
          body: |
            # AI Auto-Fix
            
            This PR was automatically generated to fix a CI failure.
            
            Please review the changes and approve if they look correct.
          commit-message: "fix: AI auto-remediation"
          labels: |
            ai-generated
            auto-fix